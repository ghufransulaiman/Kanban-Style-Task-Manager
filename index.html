<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Task Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


 <header>
  <h1>Kanban Task Board</h1>
  <span id="taskCounter">0 Tasks</span>

  <label for="priorityFilter">Filter by Priority:</label>
  <select id="priorityFilter">
    <option value="all">All</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>
 </header>

  <main>
    <section id="todo">
      <h2>To Do</h2>
      <ul class="taskList"></ul>
      <button class="addTaskBtn" data-column="todo">Add Task</button>
    </section>

    <section id="inprogress">
      <h2>In Progress</h2>
      <ul class="taskList"></ul>
      <button class="addTaskBtn" data-column="inprogress">Add Task</button>
    </section>

    <section id="done">
      <h2>Done</h2>
      <ul class="taskList"></ul>
      <button class="addTaskBtn" data-column="done">Add Task</button>
    </section>
  </main>

  <div id="taskModal" class="hidden">
      <div class="modal-content">
        <h2>Add Task</h2>

        <label for="taskTitle">Title:</label>
        <input type="text" id="taskTitle">

        <label for="taskDescription">Description:</label>
        <textarea id="taskDescription"></textarea>

        <label for="taskPriority">Priority:</label>
        <select id="taskPriority">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>

        <label for="taskDueDate">Due Date:</label>
        <input type="date" id="taskDueDate">

        <button id="saveTaskBtn">Save</button>
        <button id="cancelTaskBtn">Cancel</button>
      </div>
    </div>

    <script src="taskmanager.js">
      let tasks = [];
      let currentColumn = "";
      let editTaskId = null;

      const taskCounter = document.getElementById("taskCounter");
      const taskModal = document.getElementById("taskModal");
      const taskTitle = document.getElementById("taskTitle");
      const taskDescription = document.getElementById("taskDescription");
      const taskPriority = document.getElementById("taskPriority");
      const taskDueDate = document.getElementById("taskDueDate");
      const saveTaskBtn = document.getElementById("saveTaskBtn");
      const cancelTaskBtn = document.getElementById("cancelTaskBtn");
      const addTaskButtons = document.querySelectorAll(".addTaskBtn");

      function createTaskCard(taskObj) {
        li.setAttribute("data-priority", taskObj.priority);

        const li = document.createElement("li");
        li.setAttribute("data-id", taskObj.id);
        li.classList.add("task-card");

        const title = document.createElement("h3");
        title.classList.add("task-title");
        title.textContent = taskObj.title;
        li.appendChild(title);

        title.addEventListener("dblclick", function () {
          const input = document.createElement("input");
          input.setAttribute("type", "text");
          input.value = title.textContent;
          input.classList.add("inline-edit-input");

          li.replaceChild(input, title);
          input.focus();

          function saveInlineEdit() {
            const newTitle = input.value.trim();

            if (newTitle !== "") {
              taskObj.title = newTitle;
              title.textContent = newTitle;
            }

            if (li.contains(input)) {
              li.replaceChild(title, input);
            }
          }

          input.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
              saveInlineEdit();
            }
          });

          input.addEventListener("blur", function () {
            saveInlineEdit();
          });
        });

        const description = document.createElement("p");
        description.classList.add("task-description");
        description.textContent = taskObj.description;
        li.appendChild(description);

        const priority = document.createElement("span");
        priority.classList.add("priority-badge");
        priority.classList.add(taskObj.priority);
        priority.textContent = taskObj.priority;
        li.appendChild(priority);

        const dueDate = document.createElement("p");
        dueDate.classList.add("task-due-date");
        dueDate.textContent = "Due: " + taskObj.dueDate;
        li.appendChild(dueDate);

        const editButton = document.createElement("button");
          editButton.classList.add("edit-btn");
          editButton.setAttribute("data-action", "edit");
          editButton.textContent = "Edit";
          li.appendChild(editButton);

          const deleteButton = document.createElement("button");
          deleteButton.classList.add("delete-btn");
          deleteButton.setAttribute("data-action", "delete");
          deleteButton.textContent = "Delete";
          li.appendChild(deleteButton);
        return li;
      }

      const taskLists = document.querySelectorAll("section ul");

        taskLists.forEach(function (taskList) {
          taskList.addEventListener("click", function (event) {
            const action = event.target.getAttribute("data-action");

            if (!action) {
              return;
            }

            const card = event.target.closest("li");
            const taskId = Number(card.getAttribute("data-id"));

            if (action === "edit") {
              editTask(taskId);
            }

            if (action === "delete") {
              deleteTask(taskId);
            }
          });
        });

      function addTask(columnId, taskObj) {
        tasks.push(taskObj);

        const column = document.getElementById(columnId);
        const taskList = column.querySelector("ul");
        const taskCard = createTaskCard(taskObj);

        taskList.appendChild(taskCard);
        updateTaskCounter();
      }

      function deleteTask(taskId) {
        const card = document.querySelector('[data-id="' + taskId + '"]');

        if (card) {
          card.classList.add("fade-out");

          card.addEventListener("animationend", function () {
            card.remove();

            tasks = tasks.filter(function (task) {
              return task.id !== taskId;
            });

            updateTaskCounter();
          });
        }
      }

      function editTask(taskId) {
        const task = tasks.find(function (item) {
          return item.id === taskId;
        });

        if (task) {
          taskTitle.value = task.title;
          taskDescription.value = task.description;
          taskPriority.value = task.priority;
          taskDueDate.value = task.dueDate;

          currentColumn = task.column;
          editTaskId = taskId;

          taskModal.classList.remove("hidden");
        }
      }

      function updateTask(taskId, updatedData) {
        const task = tasks.find(function (item) {
          return item.id === taskId;
        });

        if (task) {
          task.title = updatedData.title;
          task.description = updatedData.description;
          task.priority = updatedData.priority;
          task.dueDate = updatedData.dueDate;
          task.column = updatedData.column;

          const oldCard = document.querySelector('[data-id="' + taskId + '"]');
          const newCard = createTaskCard(task);

          if (oldCard) {
            const oldColumn = oldCard.parentElement;
            oldCard.remove();

            const newColumn = document.getElementById(task.column).querySelector("ul");
            newColumn.appendChild(newCard);
          }

          updateTaskCounter();
        }
      }

      function updateTaskCounter() {
          taskCounter.textContent = tasks.length + " Tasks";
        }

        const priorityFilter = document.getElementById("priorityFilter");

        priorityFilter.addEventListener("change", function () {
          const selectedPriority = priorityFilter.value;
          const allCards = document.querySelectorAll(".task-card");

          allCards.forEach(function (card) {
            const cardPriority = card.getAttribute("data-priority");

            const shouldHide =
              selectedPriority !== "all" && cardPriority !== selectedPriority;

            card.classList.toggle("is-hidden", shouldHide);
          });
        });
    </script>
</body>
</html>
